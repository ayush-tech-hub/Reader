name: Release

on:
  push:
    tags: ["v*"]

env:
  FLUTTER_VERSION: "3.44.x"

jobs:
  android:
    name: Android release
    runs-on: ubuntu-latest
    env:
      # secrets are not allowed in step `if:` expressions; bridge
      # through env so steps can condition on signing availability.
      HAS_ANDROID_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold platform boilerplate
        run: flutter create --org com.opendocs --project-name opendocs_manager .

      - name: Decode signing keystore
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore
          cat > android/key.properties <<EOF
          storeFile=../release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release artifacts
        run: |
          flutter pub get
          flutter gen-l10n
          flutter build appbundle --release
          flutter build apk --release --split-per-abi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-*-release.apk

  ios:
    name: iOS release
    runs-on: macos-14
    env:
      HAS_IOS_SIGNING: ${{ secrets.IOS_CERT_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold platform boilerplate
        run: flutter create --org com.opendocs --project-name opendocs_manager .

      - name: Import signing certificate & provisioning profile
        if: ${{ env.HAS_IOS_SIGNING == 'true' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$IOS_CERT_BASE64" | base64 -d > "$CERT_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          flutter pub get
          flutter gen-l10n
          if [ "$HAS_IOS_SIGNING" = "true" ]; then
            flutter build ipa --release \
              --export-options-plist=ios/ExportOptions.plist
          else
            # No signing secrets configured: produce an unsigned build
            # so the pipeline still validates compilation.
            flutter build ios --release --no-codesign
          fi

      - name: Upload to release
        if: ${{ env.HAS_IOS_SIGNING == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/ipa/*.ipa
