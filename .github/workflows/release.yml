name: Release

permissions:
  contents: write

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths: [RELEASE_VERSION]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create (e.g. v1.1.0)"
        required: true

env:
  FLUTTER_VERSION: "3.44.x"

jobs:
  android:
    name: Android release
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -f RELEASE_VERSION ]; then
            echo "version=$(tr -d ' \n' < RELEASE_VERSION)" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold platform boilerplate
        run: |
          flutter create --org com.opendocs --project-name opendocs_manager .
          git checkout android/app/src/main/AndroidManifest.xml
          git checkout android/app/build.gradle.kts
          git checkout android/app/proguard-rules.pro
          git checkout android/app/src/main/res/values/styles.xml
          git checkout android/app/src/main/res/values-night/styles.xml
          git checkout android/app/src/main/res/drawable/launch_background.xml
          git checkout android/app/src/main/res/values/colors.xml
          git checkout android/app/src/main/res/values-night/colors.xml
          git checkout android/app/src/main/kotlin/com/opendocs/manager/MainActivity.kt
          git checkout android/app/src/main/kotlin/com/opendocs/manager/pdf/PdfToolsHandler.kt

      - name: Decode signing keystore
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore
          cat > android/key.properties <<EOF
          storeFile=../release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release artifacts
        run: |
          flutter pub get
          flutter gen-l10n
          flutter build appbundle --release --verbose
          flutter build apk --release --split-per-abi --verbose

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-*-release.apk

  ios:
    name: iOS release
    runs-on: macos-14
    env:
      HAS_IOS_SIGNING: ${{ secrets.IOS_CERT_BASE64 != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -f RELEASE_VERSION ]; then
            echo "version=$(tr -d ' \n' < RELEASE_VERSION)" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold platform boilerplate
        run: |
          flutter create --org com.opendocs --project-name opendocs_manager .
          # Crucial: Restore your tracked iOS configuration files & ExportOptions
          git checkout ios/ExportOptions.plist 2>/dev/null || true 
          flutter pub get
          flutter gen-l10n

      - name: Add native engine sources to Xcode project
        run: |
          cat > /tmp/add_sources.rb <<'EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Runner.xcodeproj')
          target = project.targets.find { |t| t.name == 'Runner' }
          group = project.main_group['Runner']
          %w[ArchiveEngineHandler.swift PdfToolsHandler.swift OcrHandler.swift].each do |name|
            next if group.files.any? { |f| f.path == name }
            file_ref = group.new_reference(name)
            target.add_file_references([file_ref])
          end
          project.save
          EOF
          ruby /tmp/add_sources.rb

      - name: Merge Info.plist additions
        run: |
          python3 - <<'EOF'
          import plistlib
          with open('ios/Runner/Info-additions.plist', 'rb') as f:
              additions = plistlib.load(f)
          with open('ios/Runner/Info.plist', 'rb') as f:
              base = plistlib.load(f)
          base.update(additions)
          with open('ios/Runner/Info.plist', 'wb') as f:
              plistlib.dump(base, f)
          EOF

      - name: Import signing certificate & provisioning profile
        if: ${{ env.HAS_IOS_SIGNING == 'true' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$IOS_CERT_BASE64" | base64 -d > "$CERT_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          if [ "$HAS_IOS_SIGNING" = "true" ]; then
            flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          else
            flutter build ios --release --no-codesign
          fi

      - name: Upload to release
        if: ${{ env.HAS_IOS_SIGNING == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: build/ios/ipa/*.ipa
