name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.x"

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Generate the platform boilerplate that is intentionally not
      # committed (gradle wrapper, Runner.xcodeproj, plugin registrants).
      - name: Scaffold platform boilerplate
        run: flutter create --org com.opendocs --project-name opendocs_manager .

      - name: Pub get
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Analyze
        run: flutter analyze

      - name: Unit & widget tests (with coverage)
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build-android-debug:
    name: Android debug build
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold platform boilerplate
        run: flutter create --org com.opendocs --project-name opendocs_manager .

      - name: Build debug APK
        run: |
          flutter pub get
          flutter gen-l10n
          flutter build apk --debug

  build-android-release:
    name: Android release build
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold platform boilerplate
        run: flutter create --org com.opendocs --project-name opendocs_manager .

      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/opendocs-release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../opendocs-release.jks\n' \
              "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
            echo "Release signing configured."
          else
            echo "RELEASE_KEYSTORE_BASE64 secret not set — using debug signing fallback."
          fi

      - name: Build release APKs (split by ABI)
        run: |
          flutter pub get
          flutter gen-l10n
          flutter build apk --release --split-per-abi

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30
