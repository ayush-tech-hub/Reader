name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.27.x"

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Generate the platform boilerplate that is intentionally not
      # committed (gradle wrapper, Runner.xcodeproj, plugin registrants).
      - name: Scaffold platform boilerplate
        run: flutter create --org com.opendocs --project-name opendocs_manager .

      - name: Pub get
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Unit & widget tests (with coverage)
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build-android-debug:
    name: Android debug build
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Scaffold platform boilerplate
        run: flutter create --org com.opendocs --project-name opendocs_manager .

      - name: Build debug APK
        run: |
          flutter pub get
          flutter gen-l10n
          flutter build apk --debug
